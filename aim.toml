manifest_version = 4
instruction_template = "default"
layout_profile = "claude"
symlinks = [
    "CLAUDE.md",
]
rules = []
mcp_servers = []

[repos]
anthropic = "https://github.com/anthropics/skills"
balukosuri = "https://github.com/balukosuri/Andrej-Karpathy-s-Autoresearch-As-a-Universal-Skill"
bencium-marketplace = "https://github.com/bencium/bencium-marketplace"
0xfurai = "https://github.com/0xfurai/claude-code-subagents"
aim = "https://github.com/JasperHG90/agent-integrations-manager"
wshobson = "https://github.com/wshobson/agents/"

[[skill]]
qualified_name = "anthropic/skill-creator"
repo_alias = "anthropic"
source_path = "skills/skill-creator"
target_dir = ".claude/skills/skill-creator"

[[skill]]
qualified_name = "anthropic/theme-factory"
repo_alias = "anthropic"
source_path = "skills/theme-factory"
target_dir = ".claude/skills/theme-factory"

[[skill]]
qualified_name = "balukosuri/balukosuri"
repo_alias = "balukosuri"
source_path = ""
target_dir = ".claude/skills/balukosuri"

[[skill]]
qualified_name = "bencium-marketplace/design-audit"
repo_alias = "bencium-marketplace"
source_path = "design-audit/skills/design-audit"
target_dir = ".claude/skills/design-audit"

[[skill]]
qualified_name = "bencium-marketplace/typography"
repo_alias = "bencium-marketplace"
source_path = "typography/skills/typography"
target_dir = ".claude/skills/typography"

[[skill]]
qualified_name = "aim/agent-installer"
repo_alias = "aim"
source_path = "skills/agent-installer"
target_dir = ".claude/skills/agent-installer"

[[skill]]
qualified_name = "aim/readme-creator"
repo_alias = "aim"
source_path = "skills/readme-creator"
target_dir = ".claude/skills/readme-creator"

[[skill]]
qualified_name = "wshobson/workflow-patterns"
repo_alias = "wshobson"
source_path = "plugins/conductor/skills/workflow-patterns"
target_dir = ".claude/skills/workflow-patterns"

[[subagent]]
qualified_name = "0xfurai/github-actions-expert"
repo_alias = "0xfurai"
source_path = "agents/github-actions-expert.md"
target_path = ".claude/agents/github-actions-expert.md"

[[subagent]]
qualified_name = "0xfurai/python-expert"
repo_alias = "0xfurai"
source_path = "agents/python-expert.md"
target_path = ".claude/agents/python-expert.md"

[policy]
scope = "local"

[policy.risk]
enabled = true
