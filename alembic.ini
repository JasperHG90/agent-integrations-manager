# Dev-time Alembic config for generating revisions with `uv run alembic ...`.
# At runtime aim builds an Alembic Config programmatically in db.py (no ini), so
# this file is NOT required for migrations to run — only to autogenerate new ones.
[alembic]
script_location = src/aim/core/migrations
# Overridden per invocation, e.g. `-x url=sqlite:////tmp/x.sqlite`; the placeholder
# below just lets the CLI start. Never point this at a real user database.
sqlalchemy.url = sqlite:///./.alembic-dev.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
