# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-toml
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.16
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.17
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.15.0'
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pytest-mypy, types-PyYAML, types-aiofiles, types-cachetools, types-python-dateutil, types-Markdown]
        args: [--ignore-missing-imports, --check-untyped-defs]
        # The CC plugin's tests/conftest.py shares its filename with the
        # Hermes plugin's tests/conftest.py and mypy refuses to disambiguate
        # them (https://mypy.readthedocs.io/en/stable/running_mypy.html#mapping-file-paths-to-modules).
        # Skip mypy on the CC plugin tests — they exercise bash scripts via
        # subprocess, so static type checking adds little.
        exclude: ^(tests/integration/test_app\.py|\.github/actions/hermes/runner/|\.dev-team-artifacts/|packages/claude-code-plugin/tests/)

  - repo: local
    hooks:
      - id: aim-check
        name: aim check
        description: Fail commit if AGENTS.md / mirror regions or installed skills have drifted.
        entry: aim check
        language: python
        files: '(^AGENTS\.md$|^CLAUDE\.md$|^GEMINI\.md$|^OPENCODE\.md$|^\.aim/|^\.claude/skills/)'
        pass_filenames: false
