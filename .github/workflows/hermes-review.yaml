name: Hermes Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to review (required when running manually).
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: hermes-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr-number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/review')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: pr
        run: echo "number=${{ github.event.pull_request.number || github.event.issue.number || inputs.pr-number }}" >> "$GITHUB_OUTPUT"

      - name: Fetch PR diff (with size guard)
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_DIFF_LINES: '4000'
        run: |
          set -euo pipefail
          PATCH="${{ runner.temp }}/pr.patch"
          gh pr diff "${{ steps.pr.outputs.number }}" > "$PATCH"
          LINES=$(wc -l < "$PATCH")
          echo "PR diff size: $LINES lines (cap: $MAX_DIFF_LINES)"
          if [ "$LINES" -gt "$MAX_DIFF_LINES" ]; then
            echo "Diff exceeds cap — falling back to file-list + stat summary."
            {
              echo "# PR is too large for full-diff review ($LINES lines, cap $MAX_DIFF_LINES)."
              echo ""
              echo "## Files changed"
              gh pr diff "${{ steps.pr.outputs.number }}" --name-only
              echo ""
              echo "## Stat summary"
              gh pr view "${{ steps.pr.outputs.number }}" --json files --jq '.files[] | "\(.additions)+ \(.deletions)- \(.path)"'
            } > "$PATCH"
          fi

      - id: hermes
        uses: JasperHG90/toiminnot/actions/hermes@0c29e3265ba4c99a88c03d9926c6771c9759adab  # main as of 2026-04-24
        with:
          system_prompt_file: .github/prompts/review-system.md
          skills_dir: packages/claude-code-plugin/skills
          user_message: '@${{ runner.temp }}/pr.patch'
          api_key: ${{ secrets.OLLAMA_API_KEY }}
          max_iterations: '12'
          quiet_mode: 'false'
          uv_version: '0.11.x'

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review "${{ steps.pr.outputs.number }}" --comment -F "${{ steps.hermes.outputs.response_file }}"
