# opencode plugin kind — a *pluggable* kind, NOT shipped in aim's default library.
# Drop this into your global targets dir (`<config>/targets/`) or a project's
# `.aim/targets/` and aim learns to discover + install opencode plugins. No aim
# source change. This is the showcase for extending aim with a new client.

name = "opencode"

[manifest]
# An opencode plugin is an npm package: a directory with a package.json. aim
# discovers the directory by that file, reads the plugin name from it, and
# vendors the whole directory. A directory without package metadata is not a
# discoverable plugin.
file = "package.json"
name = "name"

[register]
# The vendored directory's destination. Only {name}/{repo} are interpolated.
vendor_into = ".opencode/plugins/{name}"
